<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hana Seal</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- EXIF Library -->
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <style>
    /* Custom Scrollbar and Animations */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .zoom-in-95 {
      animation: zoomIn 0.3s ease-out forwards;
    }

    body {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<body class="bg-[#fdfcf9] text-stone-800 font-sans selection:bg-emerald-100 relative min-h-screen">

  <div id="app">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-stone-100 sticky top-0 z-20">
      <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="bg-emerald-500 p-1.5 rounded-lg shadow-sm shadow-emerald-200">
            <i data-lucide="book-open" class="w-5 h-5 text-white"></i>
          </div>
          <h1 class="text-xl font-black text-stone-800 tracking-tight">Hana Seal</h1>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-3" id="header-status">
            <!-- Status injected here -->
          </div>
          <button onclick="window.app.openSettings()"
            class="p-2 bg-stone-100 text-stone-600 rounded-full hover:bg-stone-200 transition-colors">
            <i data-lucide="settings" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="bg-white/50 backdrop-blur-sm border-b border-stone-100 sticky top-16 z-10">
      <div class="max-w-4xl mx-auto flex overflow-x-auto hide-scrollbar px-2" id="nav-tabs">
        <!-- Tabs injected here -->
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6 h-full">
      <div id="error-container"></div>
      <div id="main-content">
        <!-- Content injected here -->
      </div>
    </main>

    <!-- Hidden Input -->
    <input type="file" id="camera-input" accept="image/*" class="hidden"
      onchange="window.app.handleFileUpload(event)">

    <!-- FAB Button -->
    <div id="fab-container"></div>

    <!-- Modals & Overlays -->
    <div id="loading-overlay"></div>
    <div id="detail-modal"></div>
    <div id="confirm-modal"></div>
    <div id="confirm-import-modal"></div>
    <!-- Settings Modal -->
    <div id="settings-modal"
      class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex flex-col items-center justify-center p-4 animate-in">
      <div class="bg-white rounded-[2rem] p-6 max-w-md w-full shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 class="text-xl font-black text-stone-800 mb-4 flex items-center gap-2"><i data-lucide="settings"
            class="w-6 h-6 text-emerald-500"></i> 設定</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-stone-500 mb-1">AIプロバイダー</label>
            <select id="input-ai-provider"
              class="w-full bg-stone-50 border border-stone-200 text-stone-800 p-3 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
              onchange="window.app.toggleSettingsFields()">
              <option value="gemini">Gemini (Google)</option>
              <option value="claude">Claude (Anthropic)</option>
              <option value="openai">OpenAI / 互換API</option>
              <option value="openrouter">OpenRouter</option>
              <option value="lmstudio">LM Studio (Local)</option>
            </select>
          </div>
          <div id="field-ai-key">
            <label class="block text-xs font-bold text-stone-500 mb-1">APIキー</label>
            <input type="password" id="input-ai-key"
              class="w-full bg-stone-50 border border-stone-200 text-stone-800 p-3 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
              placeholder="APIキーを入力">
          </div>
          <div id="field-ai-url">
            <label class="block text-xs font-bold text-stone-500 mb-1">ベースURL</label>
            <input type="text" id="input-ai-url"
              class="w-full bg-stone-50 border border-stone-200 text-stone-800 p-3 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
              placeholder="https://api.openai.com/v1">
          </div>
          <div id="field-ai-model">
            <label class="block text-xs font-bold text-stone-500 mb-1">モデル名</label>
            <input type="text" id="input-ai-model"
              class="w-full bg-stone-50 border border-stone-200 text-stone-800 p-3 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
              placeholder="モデル名 (例: gemini-2.0-flash)">
          </div>
        </div>
        <div class="mt-6 flex gap-3">
          <button onclick="window.app.closeSettings()"
            class="flex-1 py-3 rounded-xl font-bold text-stone-600 bg-stone-100 hover:bg-stone-200">閉じる</button>
          <button onclick="window.app.saveSettings()"
            class="flex-1 py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 shadow-md">保存して再読込</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // --- Configuration & Constants ---
    let savedSettings = {};
    try {
      savedSettings = JSON.parse(localStorage.getItem('hanaseal_settings')) || {};
    } catch (e) { }

    const aiProvider = savedSettings.aiProvider || "gemini";
    const aiKey = savedSettings.aiKey || "";
    const aiUrl = savedSettings.aiUrl || "";
    const aiModel = savedSettings.aiModel || "gemini-2.0-flash";

    // --- IndexedDB Manager ---
    const dbName = "AI_Flora_DB";
    const storeName = "flowers";

    const initDB = () => new Promise((resolve, reject) => {
      const request = indexedDB.open(dbName, 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(storeName)) {
          db.createObjectStore(storeName, { keyPath: "id" });
        }
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    });

    const dbManager = {
      getAll: async () => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, "readonly");
          const store = transaction.objectStore(storeName);
          const request = store.getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      save: async (flower) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, "readwrite");
          const store = transaction.objectStore(storeName);
          const request = store.put(flower);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      delete: async (id) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, "readwrite");
          const store = transaction.objectStore(storeName);
          const request = store.delete(id);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      clear: async () => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(storeName, "readwrite");
          const store = transaction.objectStore(storeName);
          const request = store.clear();
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

    // --- State Management ---
    let state = {
      user: null,
      flowers: [],
      isLoadingData: true,
      activeTab: 'all',
      selectedFlower: null,
      isCapturing: false,
      loadingMsg: '',
      errorMsg: '',
      successMsg: '',
      copied: false,
      showConfirmDelete: null,
      isImporting: false,
      showConfirmImport: false,
      pendingImportData: null,
    };
    let prevState = {};

    // --- Utilities ---
    const getLocation = () => new Promise((resolve) => {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        (err) => resolve(null),
        { timeout: 5000, maximumAge: 0 }
      );
    });

    const getAddress = async (lat, lng) => {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`);
        if (res.ok) {
          const data = await res.json();
          return data.address?.city || data.address?.town || data.address?.village || data.address?.county || data.address?.state || "不明な場所";
        }
      } catch (e) { console.error(e); }
      return "場所情報あり";
    };

    const resizeImage = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          let width = img.width, height = img.height;
          let ratio = Math.min(1, 480 / Math.min(width, height));

          if (ratio < 1) {
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          canvas.width = width; canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);

          const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          resolve({ base64String: dataUrl.split(',')[1], mimeType: 'image/jpeg', fullDataUrl: dataUrl });
        };
        img.onerror = reject;
      };
      reader.onerror = reject;
    });

    const getExifData = (file) => new Promise((resolve) => {
      if (!window.EXIF) return resolve(null);
      EXIF.getData(file, function () {
        const dateStr = EXIF.getTag(this, "DateTimeOriginal") || EXIF.getTag(this, "DateTime");
        let timestamp = null;
        if (dateStr) {
          const parts = dateStr.split(" ");
          if (parts.length === 2) {
            timestamp = new Date(parts[0].replace(/:/g, "-") + "T" + parts[1]).getTime();
          }
        }

        const lat = EXIF.getTag(this, "GPSLatitude");
        const latRef = EXIF.getTag(this, "GPSLatitudeRef");
        const lng = EXIF.getTag(this, "GPSLongitude");
        const lngRef = EXIF.getTag(this, "GPSLongitudeRef");

        let location = null;
        if (lat && latRef && lng && lngRef) {
          const convert = (dms, ref) => {
            let deg = dms[0] + dms[1] / 60 + dms[2] / 3600;
            if (ref === "S" || ref === "W") deg = -deg;
            return deg;
          };
          location = { lat: convert(lat, latRef), lng: convert(lng, lngRef) };
        }
        resolve({ timestamp, location });
      });
    });

    const fetchWithRetry = async (url, options, retries = 3) => {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `HTTP error! status: ${res.status}`);
          }
          return await res.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
        }
      }
    };

    const runAI = async (prompt, base64, mime) => {
      if (!aiKey && aiProvider !== 'openai') throw new Error("APIキーが設定されていません。右上の設定から入力してください。");

      if (aiProvider === 'gemini') {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${aiKey}`;
        const res = await fetchWithRetry(url, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: mime, data: base64 } }] }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });
        const text = res.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error("AIからの応答が空でした。");
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) {
          console.log("AI Response Text:", text);
          throw new Error("AIの応答に有効なJSONデータが見つかりませんでした。コンソールを確認してください。");
        }
        return JSON.parse(match[0]);
      } else if (aiProvider === 'claude') {
        const url = "https://api.anthropic.com/v1/messages";
        const res = await fetchWithRetry(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": aiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: aiModel,
            max_tokens: 1024,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: mime, data: base64 } },
                { type: "text", text: prompt + "\nJSON形式でのみ出力してください。" }
              ]
            }]
          })
        });
        const text = res.content[0].text;
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) {
          console.log("AI Response Text:", text);
          throw new Error("AIの応答に有効なJSONデータが見つかりませんでした。コンソールを確認してください。");
        }
        return JSON.parse(match[0]);
      } else {
        // OpenAI / OpenRouter / LM Studio
        let url = aiUrl || "https://api.openai.com/v1";
        if (!url.endsWith('/v1') && !url.includes('/v1/')) url = url.replace(/\/$/, '') + '/v1';
        const fullUrl = url.replace(/\/$/, '') + "/chat/completions";

        const headers = { "Content-Type": "application/json" };
        if (aiKey) headers["Authorization"] = `Bearer ${aiKey}`;
        if (aiProvider === 'openrouter') headers["HTTP-Referer"] = window.location.origin;

        const res = await fetchWithRetry(fullUrl, {
          method: "POST", headers: headers,
          body: JSON.stringify({
            model: aiModel,
            max_tokens: 1024,
            messages: [{
              role: "user",
              content: [
                { type: "text", text: prompt },
                { type: "image_url", image_url: { url: `data:${mime};base64,${base64}` } }
              ]
            }]
          })
        });
        const text = res.choices[0].message.content;
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) {
          console.log("AI Response Text:", text);
          throw new Error("AIの応答に有効なJSONデータが見つかりませんでした。コンソールを確認してください。");
        }
        return JSON.parse(match[0]);
      }
    };

    const getGojuonRow = (yomi) => {
      if (!yomi) return 'その他';
      const c = yomi.charAt(0);
      if (/[あ-おア-オ]/.test(c)) return 'あ行';
      if (/[か-こカ-コが-ごガ-ゴ]/.test(c)) return 'か行';
      if (/[さ-そサ-ソざ-ぞザ-ゾ]/.test(c)) return 'さ行';
      if (/[た-とタ-トだ-どダ-ド]/.test(c)) return 'た行';
      if (/[な-のナ-ノ]/.test(c)) return 'な行';
      if (/[は-ほハ-ホば-ぼバ-ボぱ-ぽパ-ポ]/.test(c)) return 'は行';
      if (/[ま-もマ-モ]/.test(c)) return 'ま行';
      if (/[や-よヤ-ヨ]/.test(c)) return 'や行';
      if (/[ら-ろラ-ロ]/.test(c)) return 'ら行';
      if (/[わ-んワ-ン]/.test(c)) return 'わ行';
      return 'その他';
    };

    const chunkArray = (array, size) => {
      const chunked = [];
      for (let i = 0; i < array.length; i += size) {
        chunked.push(array.slice(i, i + size));
      }
      return chunked;
    };

    // --- Global Application Methods ---
    window.app = {
      setActiveTab: (tab) => { state.activeTab = tab; updateUI(); },
      selectFlower: (id) => { state.selectedFlower = state.flowers.find(f => f.id === id); updateUI(); },
      closeModal: () => { state.selectedFlower = null; updateUI(); },
      navigateToCategory: (tabId, categoryName) => {
        const targetCategory = categoryName || "不明";
        state.activeTab = tabId;
        state.selectedFlower = null;
        updateUI();
        setTimeout(() => {
          const el = document.getElementById(`group-${targetCategory}`);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth' });
            el.classList.add('bg-emerald-50/50', 'rounded-3xl');
            setTimeout(() => el.classList.remove('bg-emerald-50/50', 'rounded-3xl'), 2000);
          }
        }, 150);
      },
      triggerCamera: () => { document.getElementById('camera-input').click(); },
      dismissToast: (type) => {
        if (type === 'error') state.errorMsg = '';
        if (type === 'success') state.successMsg = '';
        updateUI();
      },
      confirmDelete: (id) => { state.showConfirmDelete = id; updateUI(); },
      cancelDelete: () => { state.showConfirmDelete = null; updateUI(); },

      handleFileUpload: async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        state.isCapturing = true; state.errorMsg = ''; updateUI();
        try {
          state.loadingMsg = '写真の情報を読み取っています...'; updateUI();
          const exif = await getExifData(file);

          state.loadingMsg = '画像を最適化しています...'; updateUI();
          const { base64String, mimeType, fullDataUrl } = await resizeImage(file);
          if (base64String.length * 0.75 > 1024 * 1024 * 1.3) throw new Error("最適化後も画像サイズが大きすぎます。");

          state.loadingMsg = '撮影場所を取得しています...'; updateUI();
          let location = exif?.location;
          if (!location) {
            location = await getLocation() || {};
          }
          if (location.lat && !location.address) {
            location.address = await getAddress(location.lat, location.lng);
          }

          state.loadingMsg = 'AIが花を調べています...'; updateUI();
          const prompt = `この画像に写っている花の種類を特定し、必ず以下のJSON形式でのみ情報を出力してください。他の説明や挨拶は一切不要です。\n{ "name": "一般的な花の名前（日本語）", "yomi": "はなのなまえ（ひらがなで）", "season": "春, 夏, 秋, 冬 のいずれか", "family": "植物の分類（例：バラ科）", "description": "花の特徴や豆知識などの短い説明（2〜3文程度）" }`;

          const aiResult = await runAI(prompt, base64String, mimeType);

          const newId = Date.now().toString();
          const newFlower = {
            id: newId, imageUrl: fullDataUrl,
            date: exif?.timestamp || Date.now(),
            name: aiResult.name || "不明な花", yomi: aiResult.yomi || "ふめい",
            season: aiResult.season || "不明", family: aiResult.family || "不明",
            description: aiResult.description || "説明はありません。", location
          };

          state.loadingMsg = 'ローカルに保存しています...'; updateUI();
          await dbManager.save(newFlower);

          state.flowers = [newFlower, ...state.flowers];
          state.selectedFlower = newFlower;
        } catch (err) {
          console.error(err);
          state.errorMsg = err.message || '処理中にエラーが発生しました。';
        } finally {
          state.isCapturing = false; state.loadingMsg = '';
          event.target.value = '';
          updateUI();
        }
      },

      executeDelete: async (id) => {
        try {
          await dbManager.delete(id);
          state.flowers = state.flowers.filter(f => f.id !== id);
          state.selectedFlower = null; state.showConfirmDelete = null; updateUI();
        } catch (e) {
          console.error(e); state.errorMsg = 'データの削除に失敗しました。'; updateUI();
        }
      },

      importData: () => {
        const textarea = document.getElementById('import-textarea');
        if (!textarea || !textarea.value.trim()) {
          state.errorMsg = 'データが入力されていません。';
          updateUI();
          return;
        }
        state.pendingImportData = textarea.value;
        state.showConfirmImport = true;
        updateUI();
      },

      openSettings: () => {
        document.getElementById('input-ai-provider').value = savedSettings.aiProvider || 'gemini';
        document.getElementById('input-ai-key').value = savedSettings.aiKey || '';
        document.getElementById('input-ai-url').value = savedSettings.aiUrl || '';
        document.getElementById('input-ai-model').value = savedSettings.aiModel || '';
        window.app.toggleSettingsFields();
        document.getElementById('settings-modal').classList.remove('hidden');
      },
      toggleSettingsFields: () => {
        const provider = document.getElementById('input-ai-provider').value;
        const urlField = document.getElementById('field-ai-url');
        const urlInput = document.getElementById('input-ai-url');

        if (provider === 'openai' || provider === 'openrouter' || provider === 'lmstudio') {
          urlField.classList.remove('hidden');
          if (provider === 'lmstudio' && !urlInput.value) {
            urlInput.value = 'http://localhost:1234/v1';
          }
        } else {
          urlField.classList.add('hidden');
        }
      },
      closeSettings: () => {
        document.getElementById('settings-modal').classList.add('hidden');
      },
      saveSettings: () => {
        const provider = document.getElementById('input-ai-provider').value;
        const key = document.getElementById('input-ai-key').value.trim();
        const url = document.getElementById('input-ai-url').value.trim();
        const model = document.getElementById('input-ai-model').value.trim();

        localStorage.setItem('hanaseal_settings', JSON.stringify({
          aiProvider: provider,
          aiKey: key,
          aiUrl: url,
          aiModel: model
        }));
        window.location.reload();
      },
      cancelImport: () => {
        state.showConfirmImport = false;
        state.pendingImportData = null;
        updateUI();
      },

      executeImport: async () => {
        if (!state.pendingImportData) return;
        state.showConfirmImport = false;
        state.isImporting = true;
        updateUI();

        try {
          const importedData = JSON.parse(state.pendingImportData);
          if (!Array.isArray(importedData)) {
            throw new Error('データは配列形式である必要があります。');
          }

          // 既存のデータを削除
          await dbManager.clear();

          // 新規データを追加
          for (const f of importedData) {
            const docId = f.id || Date.now().toString() + Math.random().toString(36).substr(2, 9);
            const newFlower = { ...f, id: docId };
            await dbManager.save(newFlower);
          }

          state.flowers = await dbManager.getAll();
          state.flowers.sort((a, b) => b.date - a.date);

          state.successMsg = 'データの読み込みが完了しました。';
          state.pendingImportData = null;
          state.activeTab = 'all';
        } catch (err) {
          console.error(err);
          state.errorMsg = 'データの読み込みに失敗しました: ' + err.message;
        } finally {
          state.isImporting = false;
          updateUI();
        }
      },

      copyData: () => {
        const json = JSON.stringify(state.flowers, null, 2);
        const fallback = () => {
          const t = document.createElement("textarea"); t.value = json; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(json).then(() => setCopied()).catch(fallback);
        } else { fallback(); setCopied(); }

        function setCopied() {
          state.copied = true; updateUI();
          setTimeout(() => { state.copied = false; updateUI(); }, 2000);
        }
      },

      downloadData: () => {
        const json = JSON.stringify(state.flowers, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const date = new Date().toISOString().split('T')[0];
        a.download = `ai_flora_data_${date}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
    };

    // --- Graph Logic ---
    let graphAnimId = null;
    let graphCleanup = null;

    function stopGraph() {
      if (graphAnimId) { cancelAnimationFrame(graphAnimId); graphAnimId = null; }
      if (graphCleanup) { graphCleanup(); graphCleanup = null; }
    }

    function initGraph() {
      const canvas = document.getElementById('graph-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const container = canvas.parentElement;

      const resize = () => { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; };
      resize(); window.addEventListener('resize', resize);

      const nodes = state.flowers.map(f => ({ ...f, x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: 0, vy: 0, radius: 26, imgObj: null }));
      nodes.forEach(n => { const img = new Image(); img.src = n.imageUrl; img.onload = () => n.imgObj = img; });

      const links = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          if (nodes[i].family === nodes[j].family && nodes[i].family !== '不明' && nodes[i].family) {
            links.push({ source: nodes[i], target: nodes[j], type: 'family', strength: 0.1 });
          } else if (nodes[i].season === nodes[j].season && nodes[i].season !== '不明' && nodes[i].season) {
            links.push({ source: nodes[i], target: nodes[j], type: 'season', strength: 0.015 });
          }
        }
      }

      let draggedNode = null;
      const tick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
            let distSq = dx * dx + dy * dy || 0.01;
            let force = 2000 / distSq;
            let fx = (dx / Math.sqrt(distSq)) * force, fy = (dy / Math.sqrt(distSq)) * force;
            nodes[i].vx -= fx; nodes[i].vy -= fy; nodes[j].vx += fx; nodes[j].vy += fy;
          }
          nodes[i].vx += ((canvas.width / 2) - nodes[i].x) * 0.005;
          nodes[i].vy += ((canvas.height / 2) - nodes[i].y) * 0.005;
        }

        links.forEach(l => {
          let dx = l.target.x - l.source.x, dy = l.target.y - l.source.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (!dist) return;
          let force = (dist - (l.type === 'family' ? 100 : 180)) * l.strength;
          let fx = (dx / dist) * force, fy = (dy / dist) * force;
          l.source.vx += fx; l.source.vy += fy; l.target.vx -= fx; l.target.vy -= fy;
        });

        links.forEach(l => {
          ctx.beginPath(); ctx.moveTo(l.source.x, l.source.y); ctx.lineTo(l.target.x, l.target.y);
          ctx.strokeStyle = l.type === 'family' ? 'rgba(16, 185, 129, 0.5)' : 'rgba(168, 162, 158, 0.3)';
          ctx.lineWidth = l.type === 'family' ? 2.5 : 1;
          if (l.type !== 'family') ctx.setLineDash([4, 4]);
          ctx.stroke(); ctx.setLineDash([]);
        });

        nodes.forEach(n => {
          if (n !== draggedNode) {
            n.vx *= 0.85; n.vy *= 0.85; n.x += n.vx; n.y += n.vy;
            n.x = Math.max(n.radius, Math.min(canvas.width - n.radius, n.x));
            n.y = Math.max(n.radius, Math.min(canvas.height - n.radius, n.y));
          }
          ctx.save(); ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
          ctx.fillStyle = '#fdfcf9'; ctx.fill(); ctx.clip();
          if (n.imgObj && n.imgObj.complete) {
            let scale = (n.radius * 2) / Math.min(n.imgObj.width, n.imgObj.height);
            ctx.drawImage(n.imgObj, n.x - (n.imgObj.width * scale) / 2, n.y - (n.imgObj.height * scale) / 2, n.imgObj.width * scale, n.imgObj.height * scale);
          }
          ctx.restore();
          ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
          ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
          ctx.lineWidth = 3; ctx.strokeStyle = '#10b981'; ctx.stroke();

          ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
          let tw = ctx.measureText(n.name).width;
          ctx.fillStyle = 'rgba(253, 252, 249, 0.8)'; ctx.fillRect(n.x - tw / 2 - 4, n.y + n.radius + 6, tw + 8, 14);
          ctx.fillStyle = '#44403c'; ctx.fillText(n.name, n.x, n.y + n.radius + 16);
        });
        graphAnimId = requestAnimationFrame(tick);
      };
      tick();

      const getPos = e => { const r = canvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top }; };
      let isDragging = false, startPos = { x: 0, y: 0 };

      const down = e => {
        const p = getPos(e); draggedNode = nodes.find(n => Math.hypot(n.x - p.x, n.y - p.y) < n.radius + 10);
        if (draggedNode) { isDragging = true; startPos = p; if (e.cancelable) e.preventDefault(); }
      };
      const move = e => { if (isDragging) { const p = getPos(e); draggedNode.x = p.x; draggedNode.y = p.y; draggedNode.vx = 0; draggedNode.vy = 0; } };
      const up = e => {
        if (isDragging && draggedNode) {
          const p = getPos(e.changedTouches ? e.changedTouches[0] : e);
          if (Math.hypot(startPos.x - p.x, startPos.y - p.y) < 5) window.app.selectFlower(draggedNode.id);
        }
        isDragging = false; draggedNode = null;
      };

      canvas.addEventListener('mousedown', down); window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
      canvas.addEventListener('touchstart', down, { passive: false }); window.addEventListener('touchmove', move, { passive: true }); window.addEventListener('touchend', up);

      graphCleanup = () => {
        window.removeEventListener('resize', resize);
        canvas.removeEventListener('mousedown', down); window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up);
        canvas.removeEventListener('touchstart', down); window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up);
      };
    }

    // --- Bottom Sheet Logic ---
    let sheetCleanup = null;
    function attachBottomSheetEvents() {
      const content = document.getElementById('bs-content');
      const bgImg = document.getElementById('bs-bg-img');
      const handle = document.getElementById('bs-handle');
      if (!content || !handle) return;
      if (sheetCleanup) sheetCleanup();

      const winH = window.innerHeight;
      const H_COLL = winH * 0.7, H_HALF = winH * 0.4, H_EXP = 60;
      let sheetY = H_HALF, isDrag = false, startY = 0, startSheetY = 0;

      const setY = (y) => {
        sheetY = y; content.style.transform = `translateY(${y}px)`;
        if (bgImg) bgImg.style.opacity = y < H_HALF ? 0.3 : 1;
      };
      setY(H_HALF); // 初期位置

      const sDrag = e => { isDrag = true; startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY; startSheetY = sheetY; content.style.transition = 'none'; };
      const mDrag = e => { if (isDrag) { let ny = startSheetY + ((e.type.includes('mouse') ? e.clientY : e.touches[0].clientY) - startY); setY(Math.max(ny, H_EXP)); } };
      const eDrag = () => {
        if (!isDrag) return; isDrag = false;
        content.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
        if (sheetY > winH * 0.85) window.app.closeModal();
        else if (sheetY > (H_HALF + H_COLL) / 2) setY(H_COLL);
        else if (sheetY > (H_EXP + H_HALF) / 2) setY(H_HALF);
        else setY(H_EXP);
      };

      handle.addEventListener('mousedown', sDrag); handle.addEventListener('touchstart', sDrag, { passive: false });
      window.addEventListener('mousemove', mDrag); window.addEventListener('mouseup', eDrag);
      window.addEventListener('touchmove', mDrag, { passive: false }); window.addEventListener('touchend', eDrag);

      sheetCleanup = () => {
        window.removeEventListener('mousemove', mDrag); window.removeEventListener('mouseup', eDrag);
        window.removeEventListener('touchmove', mDrag); window.removeEventListener('touchend', eDrag);
      };
    }

                <div class="pt-16 px-8 sm:px-10 overflow-y-auto pb-32 h-full">
                    <div class="mb-8"><span class="inline-block px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-full mb-2 tracking-widest uppercase">${f.yomi}</span><h2 class="text-4xl font-black text-stone-800 tracking-tight leading-none">${f.name}</h2></div>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                      <div onclick="window.app.navigateToCategory('season', '${f.season}')" class="cursor-pointer hover:bg-stone-100 hover:scale-[1.02] active:scale-[0.98] transition-all bg-stone-50 border border-stone-100 rounded-2xl p-4 flex flex-col items-center text-center group/item"><div class="text-emerald-500 mb-1 group-hover/item:scale-110 transition-transform"><i data-lucide="calendar" class="w-4 h-4"></i></div><div class="text-[9px] font-black text-stone-300 uppercase tracking-widest mb-0.5">見ごろ</div><div class="font-bold text-stone-800 text-sm">${f.season}</div></div>
                      <div onclick="window.app.navigateToCategory('family', '${f.family}')" class="cursor-pointer hover:bg-stone-100 hover:scale-[1.02] active:scale-[0.98] transition-all bg-stone-50 border border-stone-100 rounded-2xl p-4 flex flex-col items-center text-center group/item"><div class="text-emerald-500 mb-1 group-hover/item:scale-110 transition-transform"><i data-lucide="leaf" class="w-4 h-4"></i></div><div class="text-[9px] font-black text-stone-300 uppercase tracking-widest mb-0.5">分類</div><div class="font-bold text-stone-800 text-sm">${f.family}</div></div>
                    </div>
                    <div class="mb-8"><h4 class="text-xs font-black text-stone-400 mb-3 flex items-center gap-2 uppercase tracking-widest"><i data-lucide="info" class="w-3.5 h-3.5"></i> Description</h4><p class="text-stone-600 text-base leading-relaxed font-medium">${f.description}</p></div>
                    ${f.location ? `<div class="bg-stone-100/50 border border-stone-200/50 rounded-2xl p-5 mb-8"><h4 class="text-xs font-black text-stone-400 mb-2 uppercase tracking-widest flex items-center gap-2"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Spotted at</h4><p class="text-stone-700 font-bold text-lg">${f.location.address || '場所情報なし'}</p></div>` : ''}
                    <button onclick="window.app.confirmDelete('${f.id}')" class="w-full py-4 text-sm font-bold text-stone-300 hover:text-red-400 transition-colors border border-stone-200 rounded-2xl mb-8">このデータを削除する</button>
                </div>
             </div>
          </div>`;
        setTimeout(attachBottomSheetEvents, 0);
      } else if (!state.selectedFlower) {
        detailContainer.innerHTML = '';
        if (sheetCleanup) { sheetCleanup(); sheetCleanup = null; }
      }

      // Confirm Delete Modal
      document.getElementById('confirm-modal').innerHTML = state.showConfirmDelete ? `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex flex-col items-center justify-center p-8 animate-in">
          <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl zoom-in-95">
            <h3 class="text-xl font-bold text-stone-800 mb-2">本当に削除しますか？</h3>
            <p class="text-sm text-stone-500 mb-8">クラウドから完全に削除され、元に戻せなくなります。</p>
            <div class="flex gap-4 w-full">
              <button onclick="window.app.cancelDelete()" class="flex-1 py-3.5 rounded-xl font-bold text-stone-600 bg-stone-100 hover:bg-stone-200">キャンセル</button>
              <button onclick="window.app.executeDelete('${state.showConfirmDelete}')" class="flex-1 py-3.5 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-500/30">削除する</button>
            </div>
          </div>
        </div>` : '';

      // Confirm Import Modal
      document.getElementById('confirm-import-modal').innerHTML = state.showConfirmImport ? `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex flex-col items-center justify-center p-8 animate-in">
          <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl zoom-in-95">
            <h3 class="text-xl font-bold text-stone-800 mb-2">データを復元しますか？</h3>
            <p class="text-sm text-red-500 font-bold mb-2">現在のデータはすべて消去され、入力したデータで上書きされます。</p>
            <p class="text-xs text-stone-500 mb-8">この操作は元に戻せません。</p>
            <div class="flex gap-4 w-full">
              <button onclick="window.app.cancelImport()" class="flex-1 py-3.5 rounded-xl font-bold text-stone-600 bg-stone-100 hover:bg-stone-200">キャンセル</button>
              <button onclick="window.app.executeImport()" class="flex-1 py-3.5 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-500/30">復元する</button>
            </div>
          </div>
        </div>` : '';

      // Create lucide icons for newly added HTML
      lucide.createIcons();
      prevState = { ...state };
    }

    // --- Initialization ---
    const loadData = async () => {
      try {
        const data = await dbManager.getAll();
        data.sort((a, b) => b.date - a.date);
        state.flowers = data;
      } catch (err) {
        console.error(err);
        state.errorMsg = "データの読み込みに失敗しました。";
      } finally {
        state.isLoadingData = false;
        updateUI();
      }
    };

    loadData();
    updateUI(); // Initial render

  </script>
</body>

</html>
